<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank Arabic</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="login-area">
      <h3 class="text-center">
        Welcome To <span class="bankText">Bank Arabic</span>
      </h3>
      <div class="submit-container">
        <div class="submit-area">
          <h4>Login</h4>
          <input
            type="text"
            class="form-control"
            placeholder="Name"
          /><br /><br />
          <input
            type="text"
            class="form-control"
            placeholder="Password"
          /><br /><br />
          <button id="login" class="btn1">Enter</button>
        </div>
      </div>
    </div>

    <!-- transaction-area -->
    <div id="transaction-area">
      <div class="row">
        <div class="cl-4 Deposite">
          <h5>Deposite</h5>
          <h2>$<span id="currentDeposite">00</span></h2>
        </div>

        <div class="cl-4 Withdraw">
          <h5>Withdraw</h5>
          <h2>$00</h2>
        </div>

        <div class="cl-4 Balance">
          <h5>Balance</h5>
          <h2>$<span id="currentBalance">1100</span></h2>
        </div>
      </div>

      <!-- input area -->
      <div class="row">
        <div class="cl-6">
          <h4>Deposite</h4>
          <input id="depositeAmount" class="input3" type="text" />
          <button id="addDeposite" class="btn2">Deposite</button>
        </div>

        <div class="cl-6">
          <h4>Withdraw</h4>
          <input id="withdrawAmount" class="input3" type="text" />
          <button id="addWithdraw" class="btn2">Withdraw</button>
        </div>
      </div>
    </div>

    <script>
      //loging button event handler
      const loginBtn = document.getElementById("login");
      loginBtn.addEventListener("click", function () {
        const loginArea = document.getElementById("login-area");
        loginArea.style.display = "none";
        const transactionArea = document.getElementById("transaction-area");
        transactionArea.style.display = "block";
      });

      //deposite button event handler
      const depositeBtn = document.getElementById("addDeposite");
      depositeBtn.addEventListener("click", function () {
        const depositeAmount = document.getElementById("depositeAmount").value;
        const depositeNumber = parseFloat(depositeAmount);

        updateSpanText("currentDeposite", depositeNumber);

        updateSpanText("currentBalance", depositeNumber);
        document.getElementById("depositeAmount").value = "";
      });
      // withdreaw button event handler
      const withdrawBtn = document.getElementById("addWithdraw");
      withdrawBtn.addEventListener("click", function () {
        const withdrawNumber = getInputNubmer("withdreawAmount");
      });
      function getInputNubmer(id) {
        const Amount = document.getElementById(id).value;
        const AmountNumber = parseFloat(Amount);
        return AmountNumber;
      }

      function updateSpanText(id, depositeNumber) {
        const current = document.getElementById(id).innerText;
        const currentNumber = parseFloat(current);
        const totalAmount = currentNumber + depositeNumber;
        document.getElementById(id).innerText = totalAmount;
      }
    </script>
  </body>
</html>
